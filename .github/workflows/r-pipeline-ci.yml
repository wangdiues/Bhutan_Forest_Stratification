name: r-pipeline-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install R packages
        shell: pwsh
        run: |
          Rscript -e "install.packages(c('jsonlite','readxl','sf','terra','ggplot2','vegan','indicspecies','permute','mblm','igraph','tidygraph','ggraph','testthat'), repos='https://cloud.r-project.org')"
      - name: Parse R files
        shell: pwsh
        run: |
          Rscript -e "files <- list.files('r', pattern='\\.R$', recursive=TRUE, full.names=TRUE); for (f in files) parse(file=f)"
      - name: Run tests
        shell: pwsh
        run: |
          Rscript r/tests/run_tests.R
      - name: Dry run pipeline
        shell: pwsh
        run: |
          ./run_r.ps1 -DryRun
