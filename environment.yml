# Conda environment for Bhutan Forest Stratification Pipeline
# Alternative to pip for scientific computing environments

name: bhutan-forest
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.12

  # Core scientific stack
  - numpy>=1.24,<2
  - pandas>=2.0,<3
  - scipy>=1.11,<2
  - scikit-learn>=1.3,<2
  - statsmodels>=0.14

  # Geospatial
  - geopandas>=0.14,<1
  - rasterio>=1.3,<2
  - shapely>=2.0,<3
  - pyproj>=3.4
  - pyogrio>=0.6
  - gdal>=3.6
  - fiona>=1.9

  # Ecology/biodiversity
  - scikit-bio>=0.5.9
  - networkx>=3.1
  - scikit-posthocs>=0.8.0   # Dunn's post-hoc test (module 03, B2)

  # Visualization
  - matplotlib>=3.7,<4
  - seaborn>=0.12

  # Data I/O
  - openpyxl>=3.1,<4
  - h5py>=3.8

  # Pipeline utilities
  - tqdm>=4.65
  - psutil>=5.9
  - click>=8.0

  # Testing
  - pytest>=7.0
  - pytest-cov>=4.0

  # Development
  - black>=23.0
  - isort>=5.12
  - flake8>=6.0
  - mypy>=1.0
  - pre-commit>=3.0

  # Documentation
  - sphinx>=7.0
  - sphinx-rtd-theme>=2.0
  - myst-parser>=2.0

  # Jupyter (optional)
  - jupyterlab>=4.0
  - ipykernel>=6.0

  # Pip for packages not in conda
  - pip>=23.0
  - pip:
    - -e .[test,dev]

# Prefix for local installation (optional)
# prefix: /opt/conda/envs/bhutan-forest
